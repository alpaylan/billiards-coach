# Track a broadcast match into browsable .shot files — the cloud tracker.
#
# Triggers:
#   * workflow_dispatch — paste a video URL (YouTube VOD or direct mp4), get a
#     tracked/annotated/calibrated match as a workflow artifact + an ntfy push.
#   * repository_dispatch (type bilardo-match) — fired by the bilardo.info
#     watcher Worker when live matches appear. Runs only if the payload carries
#     a video_url; otherwise exits gracefully — the watcher's ntfy push already
#     told a human.
#
# Structure: TWO jobs, because download + tracking of a match section does not
# fit one 6-hour runner job (YouTube throttles datacenter downloads to roughly
# streaming pace; a 185-min section took ~100 min to pull, and tracking it
# ~3.5 h — measured 2026-07-23, run 30048279780 cancelled at the ceiling).
#
#   download — fetch the section ONCE and persist it as a `video-<name>`
#              artifact. Reruns and retries reuse the artifact instead of
#              touching YouTube again (the fragile, cookie-dependent link).
#   track    — consume the artifact, track/annotate/calibrate/bundle. The
#              shot outputs are checkpointed to the Actions cache on every
#              attempt (explicit save on always()), and the tracker resumes
#              past already-exported shots — a timeout costs the remainder,
#              not the whole job.
#
# Secrets: YT_COOKIES (base64 Netscape cookies, youtube/google domains only —
# the full jar exceeds the 48 KB secret cap). Must be FRESH: stale cookies get
# "Invalid data" media denials. Refresh:
#   yt-dlp --cookies-from-browser chrome --cookies /tmp/yt.txt --skip-download <url>
#   awk 'NR<=4 || $1 ~ /(youtube|google)/' /tmp/yt.txt | base64 | gh secret set YT_COOKIES

name: track-match

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "YouTube VOD / direct video URL"
        required: true
      name:
        description: "match name (output dir / bundle id)"
        default: "match"
      preset:
        description: "broadcast geometry"
        type: choice
        options: ["1080p", "720p", "bilardo_l", "bilardo_r"]
        default: "1080p"
      t0:
        description: "only track after this video time (s)"
        default: ""
      t1:
        description: "only track before this video time (s)"
        default: ""
      no_frames:
        description: "labeling run: don't keep frames (skips bundle; saves runner disk)"
        type: boolean
        default: false
  repository_dispatch:
    types: [bilardo-match]

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    outputs:
      skip: ${{ steps.cfg.outputs.skip }}
      name: ${{ steps.cfg.outputs.name }}
      preset: ${{ steps.cfg.outputs.preset }}
      t0: ${{ steps.cfg.outputs.t0 }}
      t1: ${{ steps.cfg.outputs.t1 }}
      cut: ${{ steps.cfg.outputs.cut }}
    steps:
      - name: Resolve inputs
        id: cfg
        env:
          URL: ${{ github.event.inputs.video_url || github.event.client_payload.video_url }}
          NAME: ${{ github.event.inputs.name || github.event.client_payload.name || 'match' }}
          PRESET: ${{ github.event.inputs.preset || github.event.client_payload.preset || '1080p' }}
          T0: ${{ github.event.inputs.t0 || github.event.client_payload.t0 }}
          T1: ${{ github.event.inputs.t1 || github.event.client_payload.t1 }}
        run: |
          if [ -z "$URL" ]; then
            echo "no video_url in payload — nothing to track (watcher push already notified a human)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          # A sectioned download starts at 0, so tracking must drop offsets.
          if [ -n "$T0" ] || [ -n "$T1" ]; then echo "cut=true" >> "$GITHUB_OUTPUT"; else echo "cut=false" >> "$GITHUB_OUTPUT"; fi
          {
            echo "url=$URL"; echo "name=$NAME"; echo "preset=$PRESET"
            echo "t0=$T0"; echo "t1=$T1"
          } >> "$GITHUB_OUTPUT"

      - name: Reuse existing video artifact if present
        id: reuse
        if: steps.cfg.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?name=video-${{ steps.cfg.outputs.name }}&per_page=10" \
               --jq '[.artifacts[] | select(.expired == false)][0].id // empty')
          if [ -n "$ID" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "video artifact already exists (id $ID) — skipping YouTube entirely"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install ffmpeg + yt-dlp (+deno for YouTube extraction)
        if: steps.cfg.outputs.skip == 'false' && steps.reuse.outputs.found == 'false'
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
          pipx install yt-dlp
          curl -fsSL https://deno.land/install.sh | sh -s -- -y >/dev/null
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: Download video
        if: steps.cfg.outputs.skip == 'false' && steps.reuse.outputs.found == 'false'
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          ARGS=(-f "bv*[height<=1080][ext=mp4]+ba/b[height<=1080]/b"
                --remote-components ejs:github
                --merge-output-format mp4 -o match.mp4)
          if [ -n "$YT_COOKIES" ]; then
            echo "$YT_COOKIES" | base64 -d > /tmp/cookies.txt
            ARGS+=(--cookies /tmp/cookies.txt)
          fi
          # With t0/t1 set, download ONLY that section: the daily table streams
          # run ~12h (a full download blows the runner's disk and the job
          # timeout), and per-match sections are what the watcher registry's
          # session index hands us.
          T0="${{ steps.cfg.outputs.t0 }}"; T1="${{ steps.cfg.outputs.t1 }}"
          if [ -n "$T0" ] || [ -n "$T1" ]; then
            ARGS+=(--download-sections "*${T0:-0}-${T1:-inf}" --force-keyframes-at-cuts)
          fi
          yt-dlp "${ARGS[@]}" "${{ steps.cfg.outputs.url }}"
          ffprobe -v error -show_entries format=duration -of csv=p=0 match.mp4

      - name: Persist video artifact
        if: steps.cfg.outputs.skip == 'false' && steps.reuse.outputs.found == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ steps.cfg.outputs.name }}
          path: match.mp4
          retention-days: 5
          compression-level: 0

  track:
    needs: download
    if: needs.download.outputs.skip == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Fetch video artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?name=video-${{ needs.download.outputs.name }}&per_page=10" \
               --jq '[.artifacts[] | select(.expired == false)][0].id')
          gh api "repos/${{ github.repository }}/actions/artifacts/$ID/zip" > video.zip
          unzip -o video.zip && rm video.zip
          ls -la match.mp4

      - name: Install ffmpeg + python deps
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
          pip install -q numpy opencv-python-headless

      - uses: Swatinem/rust-cache@v2

      - name: Build tracker (static ONNX Runtime)
        run: cargo build -p billiards-cli --features track --release

      - name: Restore tracking checkpoint
        uses: actions/cache/restore@v4
        with:
          path: out/${{ needs.download.outputs.name }}
          key: track-out-${{ needs.download.outputs.name }}-${{ github.run_id }}
          restore-keys: |
            track-out-${{ needs.download.outputs.name }}-

      - name: Track match
        run: |
          ARGS=(--match match.mp4 --model python/detector.onnx
                --out-root out --name "${{ needs.download.outputs.name }}"
                --preset "${{ needs.download.outputs.preset }}")
          # A section-downloaded file already starts at t0 — no tracker offsets.
          if [ "${{ needs.download.outputs.cut }}" != "true" ]; then
            [ -n "${{ needs.download.outputs.t0 }}" ] && ARGS+=(--t0 "${{ needs.download.outputs.t0 }}")
            [ -n "${{ needs.download.outputs.t1 }}" ] && ARGS+=(--t1 "${{ needs.download.outputs.t1 }}")
          fi
          [ "${{ github.event.inputs.no_frames }}" = "true" ] && ARGS+=(--no-frames)
          ./target/release/billiards track "${ARGS[@]}"

      - name: Save tracking checkpoint
        if: always()
        uses: actions/cache/save@v4
        with:
          path: out/${{ needs.download.outputs.name }}
          key: track-out-${{ needs.download.outputs.name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Annotate make/miss from scoreboard (Python, best-effort)
        run: |
          cd python && python3 annotate_results.py ../match.mp4 "../out/${{ needs.download.outputs.name }}" || true

      - name: Calibrate physics + verify
        run: |
          cargo run -p billiards-solver --example calibrate_match --release -- "out/${{ needs.download.outputs.name }}" || true
          cargo run -p billiards-solver --example verify_match --release -- "out/${{ needs.download.outputs.name }}" | tee out/verify.txt

      - name: Build web bundle (per-shot MP4s)
        if: github.event.inputs.no_frames != 'true'
        run: |
          python3 - <<'EOF'
          import json, os, sys
          sys.path.insert(0, 'python')
          from publish_bundle import publish_game
          name = "${{ needs.download.outputs.name }}"
          n = publish_game('out', name, f'bundle/{name}')
          shots = json.load(open(f'bundle/{name}/shots.json'))
          made = sum(1 for s in shots if s.get('result') == 'make')
          json.dump({"games": [{"id": 0, "dir": name, "left": name, "right": "",
                                "n_shots": len(shots), "n_made": made}]},
                    open('bundle/match.json', 'w'), indent=1)
          print(f"bundle: {n} shots, {made} made")
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.download.outputs.name }}
          path: |
            out/
            bundle/
          retention-days: 30

      - name: Notify
        if: always()
        run: |
          N=$(ls out/${{ needs.download.outputs.name }}/*.shot 2>/dev/null | wc -l)
          curl -s -X POST "https://ntfy.sh/bilardo-watch-95271fa2aa3f" \
            -H "Title: track-match ${{ job.status }}: ${{ needs.download.outputs.name }}" \
            -d "$N shots tracked. Artifact: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
